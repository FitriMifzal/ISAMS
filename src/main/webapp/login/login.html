<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KV Student Management System</title>
    
    <!-- Font Awesome for Eye Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!-- LOGIN CONTAINER -->
    <div class="login-container">
        <!-- LOGIN CARD -->
        <div class="login-card">
            <!-- BACK BUTTON TO LANDING PAGE -->
            <a href="../LandingPage/LandingPage.html" class="back-button" title="Back to Landing Page">
                <i class="fas fa-arrow-left"></i>
            </a>

            <!-- KV LOGO -->
            <div class="logo-section">
                <img src="../image/Logo Kolej Vokasional.jpeg" alt="KV Logo" class="kv-logo">
            </div>

            <!-- TITLE -->
            <h1 class="login-title">Intervention: <span class="highlight">Student Attendance Management</span> System</h1>
            <p class="login-subtitle">Login to your account</p>

            <!-- ROLE SELECTION -->
            <div class="role-selection">
                <label class="role-label">Select Role</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input 
                            type="radio" 
                            name="role" 
                            value="Penyelaras Intervensi"
                            data-role="Penyelaras Intervensi"
                            checked
                        >
                        <span>Penyelaras Intervensi</span>
                    </label>
                    <label class="radio-option">
                        <input 
                            type="radio" 
                            name="role" 
                            value="Teacher"
                            data-role="Teacher"
                        >
                        <span>Teacher</span>
                    </label>
                </div>
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <!-- ID FIELD (Penyelaras only) -->
                <div class="form-group" id="idGroup">
                    <label for="id">Penyelaras ID <span class="required-star">*</span></label>
                    <input 
                        type="text" 
                        id="id" 
                        class="form-control" 
                        placeholder="Enter your Penyelaras ID"
                    >
                </div>

                <!-- IC NUMBER FIELD (Teacher only) -->
                <div class="form-group hidden" id="icGroup">
                    <label for="ic">IC Number <span class="required-star">*</span></label>
                    <input 
                        type="text" 
                        id="ic" 
                        class="form-control" 
                        placeholder="Enter your IC Number"
                    >
                </div>

                <!-- PASSWORD FIELD WITH EYE ICON -->
                <div class="form-group">
                    <label for="password">Password <span class="required-star">*</span></label>
                    <div class="password-field">
                        <input 
                            type="password" 
                            id="password" 
                            class="form-control" 
                            placeholder="Enter your password"
                            required
                        >
                        <!-- EYE ICON TO TOGGLE PASSWORD -->
                        <button 
                            type="button" 
                            class="eye-icon" 
                            onclick="togglePasswordVisibility()"
                            title="Show or hide password"
                            aria-label="Toggle password visibility"
                        >
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- ERROR MESSAGE -->
                <div id="errorMsg" class="error-message hidden"></div>

                <!-- LOGIN BUTTON -->
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                    Login
                </button>
            </form>

            <!-- FOOTER NOTE -->
            <p class="login-footer">
                <i class="fas fa-shield-alt footer-icon"></i>
                System will redirect to Dashboard after successful login
            </p>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="login.js"></script>
</body>
</html>
