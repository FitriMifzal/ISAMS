<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Sidebar CSS DULU (defines all variables) -->
    <link rel="stylesheet" href="../Sidebar/Sidebar.css">
    
    <!-- Page CSS SELEPAS -->
    <link rel="stylesheet" href="createStudent.css">
</head>
<body>
<div id="sidebar">
        <div class="logo-container">
            <img src="../image/Logo Kolej Vokasional.jpeg" alt="KV Logo">
        </div>
     
        <div class="role-badge">Subject Teacher</div>
     
        <div class="nav-menu">
            <!-- DASHBOARD -->
            <a href="../Dashboard/Dashboard.html" class="nav-item">Dashboard</a>
     
            <!-- TEACHER ACCOUNT -->
            <a href="../Delete-Account/DeleteAccount.html" id="nav-account" class="nav-item" data-role="Penyelaras Intervensi">Teacher Accounts</a>
     
            <!-- STUDENT CLASS -->
            <a href="../Student Class/StudentClass.html" class="nav-item" data-role="Penyelaras Intervensi">Classroom</a>
     
            <!-- STUDENT PROFILE -->
            <a href="../Student-List/StudentList.html" class="nav-item">Student Profile</a>
     
            <!-- SUBJECT -->
            <button class="nav-item" data-submenu>
                Subject
                <span class="arrow">▾</span>
            </button>
            <div class="submenu">
                <a class="sub-nav-item" href="../Subject/Subject.html" data-role="Teacher">Subject Enrollment</a>
                <a class="sub-nav-item" href="../Enroll-Subject/Enroll-Subject.html" data-role="Teacher">Register Students</a>
                <a class="sub-nav-item" href="../Subject/Subject.html" data-role="Penyelaras Intervensi">Subject Details</a>
            </div>
     
            <a href="../Create-Student-Attendance/Create-Student-Attendance.html" class="nav-item" data-role="Teacher">Student Attendance</a>
            <a href="../Calculate-Absent-Percentage/Calculate-Absent-Percentage.html" class="nav-item" data-role="Penyelaras Intervensi">Absent Record</a>
        </div>
        <button onclick="logoutUser()" class="nav-item logout">Logout</button>
    </div>
    <!-- ════════════════════════════════════════════════════════
         MAIN CONTENT AREA
         ════════════════════════════════════════════════════════ -->
    <div id="main-wrapper">
        <!-- HEADER -->
        <header id="header">
            <button class="header-title" onclick="toggleSidebar()">
                <span class="menu-icon">☰</span>
                <span class="header-text">Intervention: Student Management System</span>
            </button>
            
            <!-- USER PROFILE AREA (icon + name) -->
            <div class="user-profile" onclick="toggleProfile()">
                <span id="user-fullname">User Name</span>
                <div id="user-initial" class="user-initial-icon">?</div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main id="content">
            <div class="form-card">
                <h2 class="page-title">Create Student</h2>
                <p class="page-description">Enter the student's details below. All fields are required.</p>
                <div class="title-underline"></div>

                <form id="createForm" onsubmit="handleForm(event)">
                    <!-- Full Name -->
                    <div class="form-group">
                        <label for="stu_name">Full Name</label>
                        <input type="text" id="stu_name" placeholder="Enter student's full name" required>
                    </div>

                    <!-- IC Number -->
                    <div class="form-group">
                        <label for="stu_ic">IC Number</label>
                        <input type="text" id="stu_ic" placeholder="e.g. 900101011234" required>
                    </div>

                    <!-- Address - DIUBAH KEPADA TEXTAREA UNTUK LEBIH BESAR -->
                    <div class="form-group">
                        <label for="stu_add">Address</label>
                        <textarea id="stu_add" placeholder="Enter student's address" rows="4"></textarea>
                    </div>

                    <!-- Phone Number -->
                    <div class="form-group">
                        <label for="stu_phonenum">Contact Number</label>
                        <input type="text" id="stu_phonenum" placeholder="e.g. 0123456789">
                    </div>

                    <!-- Class ID (Dropdown) -->
                    <div class="form-group">
                        <label for="class_id">Class</label>
                        <select id="class_id" required>
                            <option value="">-- Select Class --</option>
                        </select>
                    </div>

                    <!-- Student Type - SVM or DVM -->
                    <div class="form-group">
                        <label for="student_type">Student Type</label>
                        <select id="student_type" required>
                            <option value="">-- Select Type --</option>
                            <option value="SVM">SVM</option>
                            <option value="DVM">DVM</option>
                        </select>
                    </div>

                    <!-- Form Actions -->
                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="window.location.href='../Student-List/StudentList.html'">Cancel</button>
                        <button type="submit" class="btn-submit">Confirm</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- ════════════════════════════════════════════════════════
         SCRIPTS
         ════════════════════════════════════════════════════════ -->
    <!-- Sidebar.js DULU (handle submenu, sidebar toggle, user profile init) -->
    <script src="../Sidebar/Sidebar.js"></script>
    <script src="../Header/Header.js"></script>
    <!-- Page JS SELEPAS -->
    <script src="createStudent.js"></script>
</body>
</html>
