<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom | KV Student Management</title>
    
    <!-- Bootstrap (untuk modal) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../Sidebar/Sidebar.css">
    <link rel="stylesheet" href="CreateStudentClass.css">
</head>
<body>
<div id="sidebar">
        <div class="logo-container">
            <img src="../image/Logo Kolej Vokasional.jpeg" alt="KV Logo">
        </div>
     
        <div class="role-badge">Subject Teacher</div>
     
        <div class="nav-menu">
            <!-- DASHBOARD -->
            <a href="../Dashboard/Dashboard.html" class="nav-item">Dashboard</a>
     
            <!-- TEACHER ACCOUNT -->
            <a href="../Delete-Account/DeleteAccount.html" id="nav-account" class="nav-item" data-role="Penyelaras Intervensi">Teacher Accounts</a>
     
            <!-- STUDENT CLASS -->
            <a href="../Student Class/StudentClass.html" class="nav-item" data-role="Penyelaras Intervensi">Classroom</a>
     
            <!-- STUDENT PROFILE -->
            <a href="../Student-List/StudentList.html" class="nav-item">Student Profile</a>
     
            <!-- SUBJECT -->
            <button class="nav-item" data-submenu>
                Subject
                <span class="arrow">▾</span>
            </button>
            <div class="submenu">
                <a class="sub-nav-item" href="../Subject/Subject.html" data-role="Teacher">Subject Enrollment</a>
                <a class="sub-nav-item" href="../Enroll-Subject/Enroll-Subject.html" data-role="Teacher">Register Students</a>
                <a class="sub-nav-item" href="../Subject/Subject.html" data-role="Penyelaras Intervensi">Subject Details</a>
            </div>
     
            <a href="../Create-Student-Attendance/Create-Student-Attendance.html" class="nav-item" data-role="Teacher">Student Attendance</a>
            <a href="../Calculate-Absent-Percentage/Calculate-Absent-Percentage.html" class="nav-item" data-role="Penyelaras Intervensi">Absent Record</a>
        </div>
        <button onclick="logoutUser()" class="nav-item logout">Logout</button>
    </div>
    
    <!-- MAIN CONTENT -->
    <div id="main-wrapper">
        <!-- HEADER -->
        <header id="header">
            <button class="header-title" onclick="toggleSidebar()">
                <span class="menu-icon">☰</span>
                <span class="header-text">Intervention: Student Management System</span>
            </button>
            
            <div class="user-profile" onclick="toggleProfile()">
                <span id="user-fullname">User Name</span>
                <div id="user-initial" class="user-initial-icon">?</div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main id="content">
            <div class="form-card">
                <h2 class="page-title">Classroom</h2>
                <p class="page-description">Create a new classroom by entering the class code and class name.</p>
                <div class="title-underline"></div>

                <form id="createForm" onsubmit="handleForm(event)" novalidate>
                    <div class="form-group">
                        <label for="classCode">Class Code</label>
                        <input type="text" id="classCode" placeholder="Example: 1 SVM KPD" required>
                    </div>

                    <div class="form-group">
                        <label for="className">Class Name</label>
                        <input type="text" id="className" placeholder="Example: Computer Systems & Networking" required>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="window.location.href='../Student Class/StudentClass.html'">Cancel</button>
                        <button type="submit" class="btn-submit">Confirm</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- ════════════════════════════════════════════════════════
         SUCCESS MODAL
         ════════════════════════════════════════════════════════ -->
    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title text-white">Success!</h5>
                </div>
                <div class="modal-body">
                    <p id="successMsg">Classroom created successfully!</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" onclick="closeSuccessModal()">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════════════════════
         ERROR MODAL
         ════════════════════════════════════════════════════════ -->
    <div class="modal fade" id="errorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Error!</h5>
                </div>
                <div class="modal-body">
                    <p id="errorMsg"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Sidebar/Sidebar.js"></script>
    <script src="../Header/Header.js"></script>
    <script src="CreateStudentClass.js"></script>
</body>
</html>
