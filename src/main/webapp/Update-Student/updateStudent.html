<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student | KV Student Management</title>
    
    <!-- Sidebar CSS DULU (defines all variables) -->
    <link rel="stylesheet" href="../Sidebar/Sidebar.css">
    
    <!-- Page CSS SELEPAS -->
    <link rel="stylesheet" href="updateStudent.css">
</head>
<body>
    <!-- ════════════════════════════════════════════════════════
         SIDEBAR (same structure untuk semua pages)
         ════════════════════════════════════════════════════════ -->
    <div id="sidebar">
        <div class="logo-container">
            <img src="../image/Logo Kolej Vokasional.jpeg" alt="KV Logo">
        </div>

        <div class="role-badge">Subject Teacher</div>

        <div class="nav-menu">
            <a href="../Dashboard/Dashboard.html" class="nav-item">Dashboard</a>
            <a href="../delete-account/DeleteAccount.html" id="nav-account" class="nav-item">Account</a>
            <a href="../Student Class/StudentClass.html" class="nav-item">Student Class</a>
            <a href="../Student-List/StudentList.html" class="nav-item active">Student Profile</a>
            
            <button class="nav-item" data-submenu>
                Subject
                <span class="arrow">▾</span>
            </button>
            <div class="submenu">
                <a class="sub-nav-item" href="../Subject/Subject.html">Subject Details</a>
                <a class="sub-nav-item" href="../Enroll-Subject/Enroll-Subject.html">Enroll Students</a>
            </div>
            
            <a href="../Create-Student-Attendance/Create-Student-Attendance.html" class="nav-item">Student Attendance</a>
            <a href="../Calculate-Absent-Percentage/Calculate-Absent-Percentage.html" class="nav-item">Calculate Percentage</a>
        </div>
        
        <a href="#" onclick="logoutUser()" class="nav-item logout">Logout</a>
    </div>

    <!-- ════════════════════════════════════════════════════════
         MAIN CONTENT AREA
         ════════════════════════════════════════════════════════ -->
    <div id="main-wrapper">
        <!-- HEADER -->
        <header id="header">
            <button class="header-title" onclick="toggleSidebar()">
                <span class="menu-icon">☰</span>
                <span class="header-text">Intervention: Student Management System</span>
            </button>
            
            <!-- USER PROFILE AREA (icon + name) -->
            <div class="user-profile" onclick="toggleProfile()">
                <span id="user-fullname">User Name</span>
                <div id="user-initial" class="user-initial-icon">?</div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main id="content">
			<div class="form-card">
				<h2>Update Student Profile</h2>

				<input type="hidden" id="stuId">

				<div class="form-group">
					<label for="name">Full Name</label> <input id="name" type="text"
						placeholder="Enter student's full name">
				</div>

				<div class="form-group">
					<label for="ic">IC Number</label> <input id="ic" type="text"
						placeholder="e.g. 031024045562">
				</div>

				<div class="form-group">
					<label for="cls">Class</label> <select id="cls">
						<option value="">-- Select Class --</option>
					</select>
				</div>

				<div class="form-group">
					<label>Student Type</label> <input id="studentType" type="text"
						readonly>
				</div>

				<div id="svmFields" style="display: none;">
					<div class="form-group">
						<label for="cgpaA">CGPA Academic</label> <input id="cgpaA"
							type="number" step="0.01" min="0" max="4" placeholder="e.g. 3.50">
					</div>

					<div class="form-group">
						<label for="cgpaV">CGPA Vocational</label> <input id="cgpaV"
							type="number" step="0.01" min="0" max="4" placeholder="e.g. 3.70">
					</div>
				</div>

				<div id="dvmFields" style="display: none;">
					<div class="form-group">
						<label for="repeatPaper">Repeat Paper</label> <input
							id="repeatPaper" type="number" min="0" placeholder="e.g. 2">
					</div>
				</div>

				<div class="form-group">
					<label for="address">Home Address</label>
					<textarea id="address" placeholder="Enter residential address"></textarea>
				</div>

				<div class="form-group">
					<label for="No">Contact No</label> <input id="No" type="text"
						placeholder="e.g. 0123456789">
				</div>

				<div class="form-actions">
					<button class="submit-btn" onclick="saveUpdate()">Update
						Profile</button>
					<button class="cancel-btn" type="button"
						onclick="window.location.href='../Student-List/StudentList.html'">Cancel</button>
				</div>
			</div>
		</main>
    </div>

    <!-- ════════════════════════════════════════════════════════
         SCRIPTS
         ════════════════════════════════════════════════════════ -->
    <!-- Sidebar.js DULU (handle submenu, sidebar toggle, user profile init) -->
    <script src="../Sidebar/Sidebar.js"></script>
    
    <!-- Page JS SELEPAS -->
    <script src="updateStudent.js"></script>
</body>
</html>
