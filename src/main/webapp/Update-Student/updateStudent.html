<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student | KV Student Management</title>
    
    <!-- Sidebar CSS DULU (defines all variables) -->
    <link rel="stylesheet" href="../Sidebar/Sidebar.css">
    
    <!-- Page CSS SELEPAS -->
    <link rel="stylesheet" href="updateStudent.css">
</head>
<body>
    <div id="sidebar">
        <div class="logo-container">
            <img src="../image/Logo Kolej Vokasional.jpeg" alt="KV Logo">
        </div>
        <div class="role-badge">Subject Teacher</div>
        <div class="nav-menu">
            <a href="../Dashboard/Dashboard.html" class="nav-item">Dashboard</a>
            <a href="../Delete-Account/DeleteAccount.html" id="nav-account" class="nav-item" data-role="Penyelaras Intervensi">Teacher Accounts</a>
            <a href="../Student Class/StudentClass.html" class="nav-item" data-role="Penyelaras Intervensi">Classroom</a>
            <a href="../Student-List/StudentList.html" class="nav-item">Student Profile</a>
            <button class="nav-item" data-submenu>
                Subject
                <span class="arrow">▾</span>
            </button>
            <div class="submenu">
                <a class="sub-nav-item" href="../Subject/Subject.html" data-role="Teacher">Subject Enrollment</a>
                <a class="sub-nav-item" href="../Enroll-Subject/Enroll-Subject.html" data-role="Teacher">Register Students</a>
                <a class="sub-nav-item" href="../Subject/Subject.html" data-role="Penyelaras Intervensi">Subject Details</a>
            </div>
            <a href="../Create-Student-Attendance/Create-Student-Attendance.html" class="nav-item" data-role="Teacher">Student Attendance</a>
            <a href="../Calculate-Absent-Percentage/Calculate-Absent-Percentage.html" class="nav-item" data-role="Penyelaras Intervensi">Absent Record</a>
        </div>
        <button onclick="logoutUser()" class="nav-item logout">Logout</button>
    </div>

    <!-- ════════════════════════════════════════════════════════
         MAIN CONTENT AREA
         ════════════════════════════════════════════════════════ -->
    <div id="main-wrapper">
        <!-- HEADER -->
        <header id="header">
            <button class="header-title" onclick="toggleSidebar()">
                <span class="menu-icon">☰</span>
                <span class="header-text">Intervention: Student Management System</span>
            </button>
            
            <!-- USER PROFILE AREA (icon + name) -->
            <div class="user-profile" onclick="toggleProfile()">
                <span id="user-fullname">User Name</span>
                <div id="user-initial" class="user-initial-icon">?</div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main id="content">
            <div class="shadow-box">
                <h1 class="page-title">Student Profile</h1>
                <p class="page-description">Update student information to keep your records current and accurate.</p>
                <div class="title-underline"></div>
                
                <form id="updateForm">
                    <input type="hidden" id="stuId">

                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter student's full name" required>

                    <label for="ic">IC Number</label>
                    <input type="text" id="ic" placeholder="e.g. 031024045562" required>

                    <label for="cls">Class</label>
                    <select id="cls" required>
                        <option value="">-- Select Class --</option>
                    </select>

                    <label for="student_type">Student Type</label>
                    <select id="student_type" required>
                        <option value="">-- Select Type --</option>
                        <option value="SVM">SVM</option>
                        <option value="DVM">DVM</option>
                    </select>

                    <div id="svmFields" style="display: none;">
                        <label for="cgpaA">CGPA Academic</label>
                        <input type="number" id="cgpaA" step="0.01" min="0" max="4" placeholder="e.g. 3.50">

                        <label for="cgpaV">CGPA Vocational</label>
                        <input type="number" id="cgpaV" step="0.01" min="0" max="4" placeholder="e.g. 3.70">
                    </div>

                    <div id="dvmFields" style="display: none;">
                        <label for="repeatPaper">Repeat Paper</label>
                        <input type="number" id="repeatPaper" min="0" placeholder="e.g. 2">
                    </div>

                    <label for="address">Home Address</label>
                    <textarea id="address" rows="3" placeholder="Enter student's home address"></textarea>

                    <label for="No">Contact No</label>
                    <input type="text" id="No" placeholder="e.g. 0123456789">

                    <div class="actions">
                        <button type="button" class="btn-cancel" onclick="window.location.href='../Student-List/StudentList.html'">Discard Changes</button>
                        <button type="button" class="btn-submit" onclick="saveUpdate()">Save Changes</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="../Sidebar/Sidebar.js"></script>
    <script src="../Header/Header.js"></script>
    <script src="updateStudent.js"></script>
</body>
</html>
