<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Student Profile | KV Student Management</title>
    
    <!-- Sidebar CSS DULU (defines all variables) -->
    <link rel="stylesheet" href="../Sidebar/Sidebar.css">
    
    <!-- Page CSS SELEPAS -->
    <link rel="stylesheet" href="viewStudent.css">
</head>
<body>
    <div id="sidebar">
    <div class="logo-container">
        <img src="../image/Logo Kolej Vokasional.jpeg" alt="KV Logo">
    </div>
 
    <div class="role-badge">Subject Teacher</div>
 
    <div class="nav-menu">
        
        <!-- DASHBOARD (untuk semua roles) -->
        <a class="nav-item" href="../Dashboard/Dashboard.html">Dashboard</a>
 
        <!-- TEACHER ACCOUNT — Hanya untuk Penyelaras Intervensi -->
        <a href="../delete-account/DeleteAccount.html" id="nav-account" class="nav-item" data-role="Penyelaras Intervensi">Teacher Accounts</a>
 
        <!-- STUDENT CLASS (untuk semua roles) -->
        <a href="../Student Class/StudentClass.html" class="nav-item" data-role="Penyelaras Intervensi">Classroom</a>
 
        <!-- STUDENT PROFILE (untuk semua roles) -->
        <a href="../Student-List/StudentList.html" class="nav-item">Student Profile</a>
 
        <!-- SUBJECT (dengan submenu berbeda per role) -->
        <button class="nav-item" data-submenu>
            Subject
            <span class="arrow">▾</span>
        </button>
        <div class="submenu">
            <!-- FOR SUBJECT TEACHER -->
            <a class="sub-nav-item" href="../Subject/Subject.html" data-role="Teacher">Subject Enrollment</a>
            <a class="sub-nav-item" href="../Enroll-Subject/Enroll-Subject.html" data-role="Teacher">Register Students</a>
            
            <!-- FOR PENYELARAS INTERVENSI -->
            <a class="sub-nav-item" href="../Subject/Subject.html" data-role="Penyelaras Intervensi">Subject Details</a>
        </div>
 
        <a href="../Create-Student-Attendance/Create-Student-Attendance.html" class="nav-item" data-role="Teacher">Student Attendance</a>
        <a href="../Calculate-Absent-Percentage/Calculate-Absent-Percentage.html" class="nav-item" data-role="Penyelaras Intervensi">Absent Record</a>
 
    </div>
   <button onclick="logoutUser()" class="nav-item logout">Logout</button>
</div>
    <!-- ════════════════════════════════════════════════════════
         MAIN CONTENT AREA
         ════════════════════════════════════════════════════════ -->
    <div id="main-wrapper">
        <!-- HEADER -->
         <header id="header">
            <button class="header-title" onclick="toggleSidebar()">
                <span class="menu-icon">☰</span>
                <span class="header-text">Intervention: Student Management System</span>
            </button>
            
           <div class="user-profile" onclick="window.location.href='../Profile/Profile.html'">
                <span id="user-fullname">User Name</span>
                <div id="user-initial" class="user-initial-icon">?</div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main id="content">
            <div class="view-card">
                <h2>Student Profile</h2>

                <div class="detail-row">
                    <div class="detail-label">Full Name</div>
                    <div class="detail-value" id="v_name">-</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">IC Number</div>
                    <div class="detail-value" id="v_ic">-</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Class</div>
                    <div class="detail-value" id="v_cls">-</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Home Address</div>
                    <div class="detail-value" id="v_address">-</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Contact No</div>
                    <div class="detail-value" id="v_No">-</div>
                </div>

                <button class="btn-back" onclick="window.location.href='../Student-List/StudentList.html'">BACK TO LIST</button>
            </div>
        </main>
    </div>

    <!-- ════════════════════════════════════════════════════════
         SCRIPTS
         ════════════════════════════════════════════════════════ -->
    <!-- Sidebar.js DULU (handle submenu, sidebar toggle, user profile init) -->
    <script src="../Sidebar/Sidebar.js"></script>
    <script src="../Header/Header.js"></script>
    <script src="viewStudent.js?v=5"></script>
</body>
</html>
