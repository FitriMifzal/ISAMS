<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Student Profile | KV Student Management</title>
    
    <!-- Sidebar CSS DULU (defines all variables) -->
    <link rel="stylesheet" href="../Sidebar/Sidebar.css">
    
    <!-- Page CSS SELEPAS -->
    <link rel="stylesheet" href="ViewStudent.css">
</head>
<body>
    <!-- ════════════════════════════════════════════════════════
         SIDEBAR (same structure untuk semua pages)
         ════════════════════════════════════════════════════════ -->
    <div id="sidebar">
        <div class="logo-container">
            <img src="../image/Logo Kolej Vokasional.jpeg" alt="KV Logo">
        </div>

        <div class="role-badge">Subject Teacher</div>

        <div class="nav-menu">
            <a href="../Dashboard/Dashboard.html" class="nav-item">Dashboard</a>
            <a href="../delete-account/DeleteAccount.html" id="nav-account" class="nav-item">Account</a>
            <a href="../Student Class/StudentClass.html" class="nav-item">Student Class</a>
            <a href="../Student-List/StudentList.html" class="nav-item active">Student Profile</a>
            
            <button class="nav-item" data-submenu>
                Subject
                <span class="arrow">▾</span>
            </button>
            <div class="submenu">
                <a class="sub-nav-item" href="../Subject/Subject.html">Subject Details</a>
                <a class="sub-nav-item" href="../Enroll-Subject/Enroll-Subject.html">Enroll Students</a>
            </div>
            
            <a href="../Create-Student-Attendance/Create-Student-Attendance.html" class="nav-item">Student Attendance</a>
            <a href="../Calculate-Absent-Percentage/Calculate-Absent-Percentage.html" class="nav-item">Calculate Percentage</a>
        </div>
        
        <a href="#" onclick="logoutUser()" class="nav-item logout">Logout</a>
    </div>

    <!-- ════════════════════════════════════════════════════════
         MAIN CONTENT AREA
         ════════════════════════════════════════════════════════ -->
    <div id="main-wrapper">
        <!-- HEADER -->
        <header id="header">
            <button class="header-title" onclick="toggleSidebar()">
                <span class="menu-icon">☰</span>
                <span class="header-text">Intervention: Student Management System</span>
            </button>
            
            <!-- USER PROFILE AREA (icon + name) -->
            <div class="user-profile" onclick="toggleProfile()">
                <span id="user-fullname">User Name</span>
                <div id="user-initial" class="user-initial-icon">?</div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main id="content">
            <div class="view-card">
                <h2>Student Details</h2>

                <div class="detail-row">
                    <div class="detail-label">Full Name</div>
                    <div class="detail-value" id="v_name">-</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">IC Number</div>
                    <div class="detail-value" id="v_ic">-</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Class</div>
                    <div class="detail-value" id="v_cls">-</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Home Address</div>
                    <div class="detail-value" id="v_address">-</div>
                </div>

                <div class="detail-row">
                    <div class="detail-label">Contact No</div>
                    <div class="detail-value" id="v_No">-</div>
                </div>

                <button class="btn-back" onclick="window.location.href='../Student-List/StudentList.html'">BACK TO LIST</button>
            </div>
        </main>
    </div>

    <!-- ════════════════════════════════════════════════════════
         SCRIPTS
         ════════════════════════════════════════════════════════ -->
    <!-- Sidebar.js DULU (handle submenu, sidebar toggle, user profile init) -->
    <script src="../Sidebar/Sidebar.js"></script>
    
    <!-- Page JS SELEPAS -->
    <script src="ViewStudent.js"></script>
</body>
</html>
