<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | KV Student Management</title>
    
    <link rel="stylesheet" href="../Sidebar/Sidebar.css">
    <link rel="stylesheet" href="CreateAccount.css">
</head>
<body>
    <div id="sidebar">
        <div class="logo-container">
            <img src="../image/Logo Kolej Vokasional.jpeg" alt="KV Logo">
        </div>
     
        <div class="role-badge">Admin Penyelaras</div>
     
        <div class="nav-menu">
            <!-- DASHBOARD -->
            <a href="../Dashboard/Dashboard.html" class="nav-item">Dashboard</a>
     
            <!-- TEACHER ACCOUNT — Active for this page -->
            <a href="../Delete-Account/DeleteAccount.html" id="nav-account" class="nav-item active" data-role="Penyelaras Intervensi">Teacher Accounts</a>
     
            <!-- STUDENT CLASS -->
            <a href="../Student Class/StudentClass.html" class="nav-item" data-role="Penyelaras Intervensi">Classroom</a>
     
            <!-- STUDENT PROFILE -->
            <a href="../Student-List/StudentList.html" class="nav-item">Student Profile</a>
     
            <!-- SUBJECT -->
            <button class="nav-item" data-submenu>
                Subject
                <span class="arrow">▾</span>
            </button>
            <div class="submenu">
                <a class="sub-nav-item" href="../Subject/Subject.html" data-role="Teacher">Subject Enrollment</a>
                <a class="sub-nav-item" href="../Enroll-Subject/Enroll-Subject.html" data-role="Teacher">Register Students</a>
                <a class="sub-nav-item" href="../Subject/Subject.html" data-role="Penyelaras Intervensi">Subject Details</a>
            </div>
     
            <a href="../Create-Student-Attendance/Create-Student-Attendance.html" class="nav-item" data-role="Teacher">Student Attendance</a>
            <a href="../Calculate-Absent-Percentage/Calculate-Absent-Percentage.html" class="nav-item" data-role="Penyelaras Intervensi">Absent Record</a>
        </div>
        <button onclick="logoutUser()" class="nav-item logout">Logout</button>
    </div>

    <div id="main-wrapper">
        <!-- HEADER -->
        <header id="header">
            <button class="header-title" onclick="toggleSidebar()">
                <span class="menu-icon">☰</span>
                <span class="header-text">Intervention: Student Management System</span>
            </button>
            
            <div class="user-profile" onclick="toggleProfile()">
                <span id="user-fullname">User Name</span>
                <div id="user-initial" class="user-initial-icon">?</div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main id="content">
            <div class="form-card">
                <h2 class="page-title">Create Teacher Account</h2>
                <p class="page-description">Enter the teacher's details below. All fields are required.</p>
                <div class="title-underline"></div>

                <form id="createForm" onsubmit="handleForm(event)">
                    <!-- Full Name -->
                    <div class="form-group">
                        <label for="t_name">Full Name</label>
                        <input type="text" id="t_name" placeholder="Enter teacher's full name" required>
                    </div>

                    <!-- IC Number -->
                    <div class="form-group">
                        <label for="t_ic">IC Number</label>
                        <input type="text" id="t_ic" placeholder="e.g. 900101011234" required>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="t_email">Email Address</label>
                        <input type="email" id="t_email" placeholder="e.g. teacher@school.edu" required>
                    </div>

                    <!-- Phone Number -->
                    <div class="form-group">
                        <label for="t_phonenum">Contact Number</label>
                        <input type="text" id="t_phonenum" placeholder="e.g. 0123456789">
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="t_pass">Password</label>
                        <input type="password" id="t_pass" placeholder="Enter a secure password" required>
                    </div>

                    <!-- Form Actions -->
                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="window.location.href='../Delete-Account/DeleteAccount.html'">Cancel</button>
                        <button type="submit" class="btn-submit">Confirm</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- SCRIPTS -->
    <script src="../Sidebar/Sidebar.js"></script>
    <script src="../Header/Header.js"></script>
    <script src="CreateAccount.js"></script>
</body>
</html>
